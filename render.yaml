# Render Blueprint - https://render.com/docs/blueprint-spec
services:
  - type: web
    name: agriculture-api
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install && REACT_APP_API_URL=/api npm run build
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agriculture-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: agriculture-db
    plan: free
    databaseName: agriculture
    user: agriculture
